<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BecaProg | Registro de Postulantes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="container hero-content">
      <h1>BecaProg</h1>
      <p>Sistema de postulación y asignación de becas de estudio superiores.</p>
    </div>
  </header>

  <main class="container main-layout">
    
    <section class="card-panel">
      <h2>Formulario de Inscripción</h2>
      <p class="subtitle">Ingresa tus datos personales y académicos para postular.</p>
      
      <div id="alert-message" class="alert hidden"></div>

      <form id="postulante-form">
        <div class="form-group-title">Información Personal</div>
        <div class="grid-2">
          <div class="form-control">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" required placeholder="Ej. Ana">
          </div>
          <div class="form-control">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" required placeholder="Ej. Ramos">
          </div>
        </div>

        <div class="grid-3">
          <div class="form-control">
            <label for="dni">DNI</label>
            <input type="text" id="dni" required pattern="[0-9]{8}" placeholder="8 dígitos">
          </div>
          <div class="form-control">
            <label for="edad">Edad</label>
            <input type="number" id="edad" required min="15" max="100" placeholder="Ej. 19">
          </div>
          <div class="form-control">
            <label for="sexo">Sexo</label>
            <select id="sexo" required>
              <option value="">Cargando...</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-control">
            <label for="celular">Celular</label>
            <input type="tel" id="celular" required placeholder="987654321">
          </div>
          <div class="form-control">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" required placeholder="nombre@correo.com">
          </div>
        </div>

        <div class="form-group-title">Perfil Académico</div>
        <div class="grid-2">
          <div class="form-control">
            <label for="grado_academico">Grado Académico Actual</label>
            <select id="grado_academico" required>
              <option value="">Cargando...</option>
            </select>
          </div>
          <div class="form-control">
            <label for="carrera_interes">Carrera de Interés</label>
            <select id="carrera_interes" required>
              <option value="">Cargando...</option>
            </select>
          </div>
        </div>

        <div class="form-control">
          <label for="modalidad_estudio">Modalidad de Estudio</label>
          <select id="modalidad_estudio" required>
            <option value="">Cargando...</option>
          </select>
        </div>

        <div class="form-control">
          <label for="observaciones">Observaciones / Datos adicionales</label>
          <textarea id="observaciones" rows="3" placeholder="Detalla algún logro o motivo de postulación..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Enviar Postulación</button>
      </form>
    </section>

    <section class="list-panel">
      <div class="list-header">
        <h2>Postulantes Registrados</h2>
        <div class="filter-box">
          <label for="filtro-sexo">Filtrar por Sexo:</label>
          <select id="filtro-sexo">
            <option value="todos">Todos</option>
          </select>
        </div>
      </div>

      <div id="postulantes-container" class="cards-grid">
        <p class="loading-text">Cargando registros desde Supabase...</p>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
